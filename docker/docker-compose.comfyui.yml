# ComfyUI for Cortex — GPU-accelerated image generation
# Usage: docker compose -f docker/docker-compose.comfyui.yml up -d
# Then in Cortex: Settings → ComfyUI URL: http://localhost:8188

services:
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    container_name: cortex-comfyui
    ports:
      - "8188:8188"
    volumes:
      - comfyui-models:/workspace/ComfyUI/models
      - comfyui-output:/workspace/ComfyUI/output
      - comfyui-custom-nodes:/workspace/ComfyUI/custom_nodes
    environment:
      - CORS_HEADER=*
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  comfyui-models:
  comfyui-output:
  comfyui-custom-nodes:
