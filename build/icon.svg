    <circle cx="176" cy="140" r="6" fill="url(#brain)" opacity="0.8"/>
    <circle cx="128" cy="112" r="5" fill="url(#brain)" opacity="0.6"/>
    <circle cx="96" cy="240" r="5" fill="url(#brain)" opacity="0.5"/>
