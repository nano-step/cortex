    <!-- Brain folds -->
    <path d="M48 160 Q88 140 128 160" fill="none" stroke="url(#brain)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
    <path d="M128 160 Q168 140 208 160" fill="none" stroke="url(#brain)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
